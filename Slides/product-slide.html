<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biker Slides</title>
  <link rel="stylesheet" href="/CSS/styles1.css">
  <link rel="website icon" href="/Logo/logo.png">
</head>
<body>
  <header>
    <h1>212 CLOTHING</h1>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/Slides/Slides.html">Products</a>
      <a href="/index.html">Contact</a>
    </nav>
  </header>
  <main class="container">  
    <div class="image-box">
      <div class="main-image">
      <img id="mainProductImage" src="/Slides/Slide.jpg" alt="Driver Hoodie">
      </div>
      <div class="thumbnails">
        <img id="thumbnailFront" src="/Slides/Slide.jpg" alt="Front" class="active" onclick="changeView('front')">
        <img id="thumbnailBack" src="/Slides/Slide².jpg" alt="Back"  onclick="changeView('back')">
        <img id="thumbnailside" src="/Slides/Slide²².jpg" alt="Side"  onclick="changeView('side')">
      </div>
    </div>
    <div class="details">
      <h2>Driver Hoodie</h2>
      <p>Stay warm and stylish with our premium driver hoodie. Designed for comfort and durability, it’s the perfect fit for all drivers on the road.</p>
      <p class="price">$39.99</p>
      <p><strong>Sizes:</strong> S, M, L, XL, XXL</p>
      <div class="color-options">
        <strong>Colors:</strong>
        <button class="color-swatch active" style="background-color: rgb(0, 0, 0);" data-color="gray" onclick="selectColor('gray')"></button>
        <button class="color-swatch" style="background-color: rgb(128, 128, 128);" data-color="black" onclick="selectColor('black')"></button>
        <button class="color-swatch" style="background-color: blue;" data-color="blue" onclick="selectColor('blue')"></button>
      </div>
      <button class="button" onclick="window.open('https://my-store-e6f49b.creator-spring.com/listing/spirit-of-the-ride?product=212&variation=5819', '_blank')">Buy Now</button>
    </div>
  </main>
  <footer class="footer">
    <p>Contact us at: support@212clothing.com | &copy; 2026 212 Clothing</p>
    <div class="social-icons">
      <a href="https://www.instagram.com/212clothing.ma?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram">
      </a>
    </div>  
  </footer>
  <script>
  // Define your product images. Adjust paths and colors as needed.
  // IMPORTANT: Ensure these image files exist in your project structure.
  const productImages = {
    'hoodie': {
      'green': {
        'front': '/Slides/Slide.jpg', // Example: You need to create these images
        'back': '/Slides/Slide².jpg',   // Example: You need to create these images
        'side': '/Slides/Slide²².jpg'   // Example: You need to create these images
      },
      'black': {
        'front': '/Slides/Slide.jpg', 
        'back': '/Slides/Slide².jpg',
        'side': '/Slides/Slide²².jpg'
      },
      'blue': {
        'front': '/Slides/Slide.jpg',
        'back': '/Slides/Slide².jpg',
        'side': '/Slides/Slide²².jpg'
      }
    },
    // Add other product types (e.g., 'tshirt') here with their respective colors and images
    'tshirt': {
      'black': {
        'front': 'T-Shirt_Black_Front.jpg',
        'back': 'T-Shirt_Black_Back.jpg'
      },
      'white': {
        'front': 'T-Shirt_White_Front.jpg',
        'back': 'T-Shirt_White_Back.jpg'
      },
      'red': {
        'front': 'T-Shirt_Red_Front.jpg',
        'back': 'T-Shirt_Red_Back.jpg'
      }
    }
  };

  let currentProductType = 'hoodie'; // Set the current product type (e.g., 'hoodie', 'tshirt')
  let selectedColor = 'gray'; // Default selected color
  let selectedView = 'front'; // Default selected view

  // Function to update the main product image and thumbnails
  function updateProductImage() {
    const mainImage = document.getElementById('mainProductImage');
    const thumbnailFront = document.getElementById('thumbnailFront');
    const thumbnailBack = document.getElementById('thumbnailBack');

    if (productImages[currentProductType] && productImages[currentProductType][selectedColor]) {
      mainImage.src = productImages[currentProductType][selectedColor][selectedView];
      thumbnailFront.src = productImages[currentProductType][selectedColor]['front'];
      thumbnailBack.src = productImages[currentProductType][selectedColor]['back'];
    } else {
      console.error(`Images not found for ${currentProductType}, color ${selectedColor}`);
      // Optionally set a placeholder image or handle error visually
    }

    // Update active class for thumbnails
    document.querySelectorAll('.thumbnails img').forEach(img => img.classList.remove('active'));
    if (selectedView === 'front') {
      thumbnailFront.classList.add('active');
    } else {
      thumbnailBack.classList.add('active');
    }
  }

  // Function to handle color selection
  function selectColor(color) {
    selectedColor = color;
    updateProductImage();

    // Update active class for color swatches
    document.querySelectorAll('.color-swatch').forEach(swatch => {
      if (swatch.dataset.color === color) {
        swatch.classList.add('active');
      } else {
        swatch.classList.remove('active');
      }
    });
  }

  // Function to handle view selection (front/back)
  function changeView(view) {
    selectedView = view;
    updateProductImage();
  }

  // Initialize the product image and color selection when the page loads
  document.addEventListener('DOMContentLoaded', () => {
    // Set initial product type based on the page (you might need a more robust way to determine this)
    // For example, if it's a hoodie page, set currentProductType = 'hoodie';
    // If it's a t-shirt page, set currentProductType = 'tshirt';
    // For this example, we'll assume it's a hoodie page.
    currentProductType = 'hoodie'; // Adjust this based on the actual product page

    // Set the initial active color swatch (e.g., 'gray' for hoodie)
    const initialColorSwatch = document.querySelector(`.color-swatch[data-color="${selectedColor}"]`);
    if (initialColorSwatch) {
      initialColorSwatch.classList.add('active');
    }

    updateProductImage();
  });
</script>
</body>
</html>
