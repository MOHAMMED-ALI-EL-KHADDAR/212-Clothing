<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>212 Clothing — Coming Soon</title>
  <link rel="website icon" href="/Logo/logo.png">
  <style>
    /* Reset margins and padding */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      background-color: #050505; /* Dark background */
      color: #f0ece6; /* Off-white text */
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh; /* Takes up the full height of the screen */
    }

    /* Pushes this container to the center of the screen */
    .center-content {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 30px; /* Space between logo and text */
    }

    .logo {
      max-width: 180px; /* Adjust this number to make the logo bigger/smaller */
      height: auto;
    }

    h1 {
      font-size: clamp(40px, 8vw, 80px); /* Scales text size based on screen width */
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: bold;
    }

    /* Bottom section for socials */
    .bottom-bar {
      padding: 30px;
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .bottom-bar a {
      color: #888;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-size: 14px;
      transition: color 0.3s ease;
    }

    /* Hover effect for links */
    .bottom-bar a:hover {
      color: #ff4500; /* 212 Clothing Orange */
    }
  </style>
</head>
<body>

  <div class="center-content">
    <img src="/Logo/logo.png" alt="212 Clothing Logo" class="logo" />
    <h1>Coming Soon</h1>
  </div>

  <div class="bottom-bar">
    <a href="https://www.facebook.com/profile.php?id=61576498025455" target="_blank">Facebook</a>
    <a href="https://www.tiktok.com/@212clothing" target="_blank">TikTok</a>
  </div>

</body>
</html>
