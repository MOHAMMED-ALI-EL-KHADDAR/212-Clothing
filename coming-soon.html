<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>212 Clothing — Coming Soon</title>
  <link rel="website icon" href="/Logo/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #ff4500;
      --orange-dim: rgba(255,69,0,0.15);
      --orange-glow: rgba(255,69,0,0.5);
      --bg: #050505;
      --surface: #0f0f0f;
      --text: #f0ece6;
      --muted: #888;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      overflow: hidden;
    }

    /* ── Grain overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    /* ── Canvas background ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── Layout ── */
    .stage {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 40px clamp(24px, 6vw, 80px);
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      animation: fadeDown 1s ease both;
    }
    .logo-wrap img {
      height: clamp(36px, 5vw, 52px);
      filter: drop-shadow(0 0 12px var(--orange-glow));
    }
    .status-pill {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--orange);
      border: 1px solid var(--orange);
      padding: 6px 16px;
      border-radius: 40px;
      animation: pillPulse 2.5s ease-in-out infinite;
    }
    @keyframes pillPulse {
      0%,100% { box-shadow: 0 0 0 0 transparent; }
      50%      { box-shadow: 0 0 14px 2px var(--orange-glow); }
    }

    /* ── Center content ── */
    .center {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: clamp(16px, 3vh, 32px);
    }

    .eyebrow {
      font-size: clamp(11px, 1.4vw, 13px);
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--orange);
      opacity: 0;
      animation: fadeUp 0.8s ease 0.3s both;
    }

    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 13vw, 180px);
      line-height: 0.88;
      letter-spacing: -1px;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.5s both;
    }
    .headline span {
      display: block;
      -webkit-text-stroke: 1px var(--orange);
      color: transparent;
    }
    .headline em {
      display: block;
      font-style: normal;
      color: var(--text);
    }

    .subline {
      font-size: clamp(14px, 1.8vw, 18px);
      font-weight: 300;
      letter-spacing: 2px;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.6;
      margin: 0 auto;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.7s both;
    }

    /* ── Countdown ── */
    .countdown {
      display: flex;
      justify-content: center;
      gap: clamp(20px, 4vw, 48px);
      opacity: 0;
      animation: fadeUp 0.9s ease 0.9s both;
    }
    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .unit-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 6vw, 72px);
      line-height: 1;
      color: var(--text);
      text-shadow: 0 0 30px var(--orange-glow);
    }
    .unit-label {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }
    .unit-sep {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 6vw, 72px);
      color: var(--orange);
      align-self: flex-start;
      line-height: 1;
      opacity: 0.4;
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      opacity: 0;
      animation: fadeDown 0.9s ease 1.1s both;
    }
    .social-links {
      display: flex;
      gap: 20px;
      justify-content: center;
    }
    .social-links a {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.3s;
    }
    .social-links a:hover { color: var(--orange); }
    .copy {
      font-size: 11px;
      letter-spacing: 2px;
      color: #333;
      text-align: center;
    }

    /* ── Decorative orange line ── */
    .vert-line {
      position: fixed;
      right: clamp(24px, 4vw, 60px);
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 0;
      background: linear-gradient(to bottom, transparent, var(--orange), transparent);
      animation: lineGrow 1.2s ease 1.3s both;
      z-index: 2;
    }
    @keyframes lineGrow {
      to { height: 200px; }
    }

    /* ── Keyframes ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .stage { padding: 28px 20px; }
      .vert-line { display: none; }
      .headline { font-size: clamp(72px, 22vw, 110px); }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="vert-line"></div>

<div class="stage">

  <div class="top-bar">
    <div class="logo-wrap">
      <img src="/Logo/logo.png" alt="212 Clothing">
    </div>
    <div class="status-pill">● Under Construction</div>
  </div>

  <div class="center">
    <p class="eyebrow">212 Clothing — Est. 2023</p>

    <h1 class="headline">
      <span>COMING</span>
      <em>SOON.</em>
    </h1>

    <p class="subline">
      Something bold is on the way. We're crafting every detail.
    </p>

    <div class="countdown" id="countdown">
      <div class="unit"><span class="unit-num" id="cd-d">00</span><span class="unit-label">Days</span></div>
      <div class="unit-sep">:</div>
      <div class="unit"><span class="unit-num" id="cd-h">00</span><span class="unit-label">Hours</span></div>
      <div class="unit-sep">:</div>
      <div class="unit"><span class="unit-num" id="cd-m">00</span><span class="unit-label">Mins</span></div>
      <div class="unit-sep">:</div>
      <div class="unit"><span class="unit-num" id="cd-s">00</span><span class="unit-label">Secs</span></div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="social-links">
      <a href="https://www.instagram.com/212clothing.ma?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank">Instagram</a>
      <a href="https://www.facebook.com/profile.php?id=61576498025455" target="_blank">Facebook</a>
      <a href="https://www.tiktok.com/@212clothing" target="_blank">TikTok</a>
    </div>
    <p class="copy">© 2026 212 Clothing. All rights reserved.</p>
  </div>

</div>

<script>
  /* ── Particle canvas ── */
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, pts;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    pts = Array.from({ length: 60 }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.5 + 0.3,
    }));
  }

  function drawCanvas() {
    ctx.clearRect(0, 0, W, H);

    /* subtle radial glow center-left */
    const grd = ctx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, W * 0.55);
    grd.addColorStop(0, 'rgba(255,69,0,0.06)');
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    /* particles + connections */
    pts.forEach((p, i) => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,69,0,0.5)';
      ctx.fill();

      for (let j = i + 1; j < pts.length; j++) {
        const dx = pts[j].x - p.x, dy = pts[j].y - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 140) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(pts[j].x, pts[j].y);
          ctx.strokeStyle = `rgba(255,69,0,${0.12 * (1 - dist / 140)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    });

    requestAnimationFrame(drawCanvas);
  }

  resize();
  drawCanvas();
  window.addEventListener('resize', resize, { passive: true });

  /* ── Countdown — set your launch date here ── */
  const LAUNCH = new Date('2025-09-01T00:00:00');

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const diff = LAUNCH - Date.now();
    if (diff <= 0) {
      document.getElementById('countdown').innerHTML =
        '<span style="color:var(--orange);letter-spacing:4px;font-family:\'Bebas Neue\',sans-serif;font-size:28px;">WE ARE LIVE 🔥</span>';
      return;
    }
    const d = Math.floor(diff / 864e5);
    const h = Math.floor((diff % 864e5) / 36e5);
    const m = Math.floor((diff % 36e5) / 6e4);
    const s = Math.floor((diff % 6e4) / 1000);
    document.getElementById('cd-d').textContent = pad(d);
    document.getElementById('cd-h').textContent = pad(h);
    document.getElementById('cd-m').textContent = pad(m);
    document.getElementById('cd-s').textContent = pad(s);
  }
  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
